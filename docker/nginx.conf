events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Optional: Optimizations
    sendfile        on;
    keepalive_timeout  65;
    
    upstream fastapi_app {
        server app:8000;
    }

    server {
        listen 80;
        server_name _; # Change to your domain (e.g., api.yourdomain.com) when deploying

        # Certbot challenge location
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Forward all HTTP requests to FastAPI (or uncomment next block to redirect to HTTPS)
        location / {
            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # To enforce HTTPS, comment the block above and uncomment this block:
        # location / {
        #     return 301 https://$host$request_uri;
        # }
    }

    # HTTPS Server block (uncomment once SSL certificates are generated via Certbot)
    # server {
    #     listen 443 ssl;
    #     server_name _; # Change to your domain
    #
    #     ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://fastapi_app;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
